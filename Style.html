<style>
  :root {
    --primary-color: #8B0000;
    /* Merah Tua / Crimson */
    --secondary-color: #D4AF37;
    /* Emas / Gold */
    --bg-color: #FFFBF0;
    /* Krem */
    --text-color: #333333;
    --font-heading: 'Playfair Display', serif;
    --font-body: 'Montserrat', sans-serif;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: var(--font-body);
    background-color: var(--bg-color);
    color: var(--text-color);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* Utility Classes */
  .text-center {
    text-align: center;
  }

  .w-100 {
    width: 100%;
  }

  .mt-3 {
    margin-top: 1rem;
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* Buttons */
  .btn-primary,
  .btn-secondary {
    display: inline-block;
    padding: 12px 30px;
    border: none;
    border-radius: 30px;
    font-family: var(--font-body);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
  }

  .btn-primary {
    background-color: var(--primary-color);
    color: white;
    box-shadow: 0 4px 15px rgba(139, 0, 0, 0.3);
  }

  .btn-primary:hover {
    background-color: #660000;
    transform: translateY(-2px);
  }

  .btn-secondary {
    background-color: var(--secondary-color);
    color: white;
  }

  .btn-secondary:hover {
    background-color: #b8962e;
  }

  /* Typography */
  h1,
  h2,
  h3 {
    font-family: var(--font-heading);
    color: var(--primary-color);
  }

  .section-title {
    font-size: 2.5rem;
    margin-bottom: 2rem;
    position: relative;
    display: inline-block;
  }

  .section-title::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 50px;
    height: 2px;
    background-color: var(--secondary-color);
  }

  /* Loader */
  .loader-container {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: var(--bg-color);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }

  .loader {
    border: 5px solid #f3f3f3;
    border-top: 5px solid var(--secondary-color);
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
    margin-bottom: 20px;
  }

  @keyframes spin {
    0% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  /* Toast Notification */
  .toast {
    visibility: hidden;
    min-width: 250px;
    background-color: #333;
    color: #fff;
    text-align: center;
    border-radius: 25px;
    padding: 16px;
    position: fixed;
    z-index: 10000;
    left: 50%;
    bottom: 80px;
    transform: translateX(-50%);
    font-size: 15px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    opacity: 0;
    transition: opacity 0.5s, bottom 0.5s;
  }

  .toast.show {
    visibility: visible;
    opacity: 1;
    bottom: 100px;
  }

  .toast.success {
    background-color: #28a745;
  }

  .toast.error {
    background-color: #dc3545;
  }

  /* Fix for SweetAlert2 Toast z-index */
  .swal2-container {
    z-index: 10000 !important;
  }

  /* Audio Button */
  .audio-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: var(--primary-color);
    color: var(--secondary-color);
    border: 2px solid var(--secondary-color);
    width: 50px;
    height: 50px;
    border-radius: 50%;
    font-size: 1.5rem;
    cursor: pointer;
    z-index: 1000;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% {
      box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7);
    }

    70% {
      box-shadow: 0 0 0 10px rgba(212, 175, 55, 0);
    }

    100% {
      box-shadow: 0 0 0 0 rgba(212, 175, 55, 0);
    }
  }

  @media (max-width: 768px) {
    .audio-btn {
      bottom: 80px;
    }
  }

  /* Hero Section / Carousel */
  .hero {
    height: 100vh;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    overflow: hidden;
  }

  .carousel {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  .carousel-slide {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
  }

  .carousel-slide.active {
    opacity: 1;
  }

  .hero-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    padding: 30px;
    border: 2px solid var(--secondary-color);
    background: rgba(139, 0, 0, 0.4);
    border-radius: 15px;
    backdrop-filter: blur(5px);
    box-shadow: 0 0 30px rgba(212, 175, 55, 0.3), inset 0 0 15px rgba(212, 175, 55, 0.3);
  }

  .hero-content::before {
    content: '';
    position: absolute;
    top: 5px;
    left: 5px;
    right: 5px;
    bottom: 5px;
    border: 1px dashed var(--secondary-color);
    border-radius: 10px;
    pointer-events: none;
  }

  .hero .title {
    font-size: 4rem;
    color: var(--secondary-color);
    margin: 1rem 0;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    line-height: 1.2;
  }

  .hero .and-hero {
    font-size: 2.5rem;
    color: white;
    display: block;
    margin: -10px 0;
  }

  .hero .subtitle {
    font-size: 1.5rem;
    font-weight: 400;
    letter-spacing: 2px;
  }

  .hero .date {
    font-size: 1.2rem;
    margin-bottom: 2rem;
  }

  /* Section Styles */
  .section {
    padding: 40px 0;
  }

  /* Greeting */
  .greeting-text {
    max-width: 700px;
    margin: 0 auto 2rem;
    font-size: 1.1rem;
    color: #555;
  }

  .couple-names {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 2rem;
    flex-wrap: wrap;
    margin-top: 2rem;
  }

  .couple-names .person h3 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
  }

  .couple-names .and {
    font-family: var(--font-heading);
    font-size: 3rem;
    color: var(--secondary-color);
  }

  /* Countdown & Event Details */
  .countdown-container {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-bottom: 3rem;
    flex-wrap: nowrap;
    padding-bottom: 10px;
  }

  @media (max-width: 768px) {
    .countdown-container {
      gap: 0.2rem;
    }

    .countdown-item {
      padding: 0.5rem;
      min-width: 60px;
    }

    .countdown-item span {
      font-size: 1.2rem;
    }

    .countdown-item p {
      font-size: 0.6rem;
      margin-top: 0.2rem;
    }
  }

  .countdown-item {
    background: white;
    padding: 1.5rem;
    border-radius: 10px;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
    min-width: 100px;
    border: 1px solid rgba(212, 175, 55, 0.3);
  }

  .countdown-item span {
    font-size: 2.5rem;
    font-family: var(--font-heading);
    color: var(--primary-color);
    display: block;
    line-height: 1;
  }

  .countdown-item p {
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 0.5rem;
    color: #777;
  }

  .events {
    display: flex;
    justify-content: center;
    gap: 2rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }

  .event-card,
  .location-card {
    background: white;
    padding: 2rem;
    border-radius: 15px;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
    flex: 1;
    min-width: 300px;
    border-top: 4px solid var(--secondary-color);
  }

  .event-card h3,
  .location-card h3 {
    font-size: 1.8rem;
    margin-bottom: 1rem;
  }

  .event-card p {
    margin-bottom: 0.5rem;
    font-size: 1.1rem;
  }

  .event-card i {
    color: var(--secondary-color);
    margin-right: 10px;
  }

  .map-container {
    margin-top: 1rem;
    width: 100%;
    border-radius: 10px;
    overflow: hidden;
  }

  .map-container img,
  .map-container iframe {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border: none;
  }

  /* Gallery (Masonry Style) */
  .gallery-grid {
    column-count: 3;
    column-gap: 15px;
  }

  @media (max-width: 768px) {
    .gallery-grid {
      column-count: 2;
    }
  }

  .gallery-item {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 15px;
    break-inside: avoid;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
  }

  .gallery-item img,
  .gallery-item video {
    width: 100%;
    height: auto;
    display: block;
    transition: transform 0.5s ease;
  }

  .gallery-item:hover img,
  .gallery-item:hover video {
    transform: scale(1.05);
  }

  /* RSVP */
  .rsvp-wrapper {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    background: white;
    padding: 2rem;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
  }

  @media (max-width: 768px) {
    .rsvp-wrapper {
      grid-template-columns: 1fr;
    }
  }

  .form-group {
    margin-bottom: 1.5rem;
  }

  .form-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 600;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 1rem;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: var(--secondary-color);
  }

  .guestbook-container {
    background: var(--bg-color);
    padding: 1.5rem;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.03);
    border: 1px solid rgba(212, 175, 55, 0.2);
  }

  .wishes-scroll-area {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    max-height: 400px;
    overflow-y: auto;
    padding-right: 10px;
  }

  /* Custom Scrollbar for wishes */
  .wishes-scroll-area::-webkit-scrollbar {
    width: 6px;
  }

  .wishes-scroll-area::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 10px;
  }

  .wishes-scroll-area::-webkit-scrollbar-thumb {
    background: var(--secondary-color);
    border-radius: 10px;
  }

  .wishes-scroll-area::-webkit-scrollbar-thumb:hover {
    background: var(--primary-color);
  }

  .wish-card {
    background: #f9f9f9;
    padding: 1rem;
    border-radius: 8px;
    border-left: 4px solid var(--secondary-color);
  }

  .wish-card h4 {
    margin-bottom: 0.2rem;
    color: var(--primary-color);
    font-family: var(--font-body);
  }

  .wish-date {
    font-size: 0.75rem;
    color: #666;
    margin-bottom: 8px;
    font-style: italic;
  }

  /* Footer */
  .footer {
    background: var(--primary-color);
    color: white;
    padding: 2rem 0;
  }

  @media (max-width: 768px) {
    .hero .title {
      font-size: 2.5rem;
    }

    .section-title {
      font-size: 2rem;
    }

    .couple-names {
      flex-direction: column;
      gap: 1rem;
    }
  }

  /* Digital Envelope (Gift) */
  .gift-section {
    background-color: #fff;
    padding: 4rem 2rem;
  }

  .gift-thumbnail-list {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
    margin-top: 20px;
  }

  .gift-thumbnail {
    background: var(--bg-color);
    border: 1px solid var(--secondary-color);
    border-radius: 15px;
    padding: 1.5rem;
    width: 150px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .gift-thumbnail:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
  }

  .gift-icon-thumb {
    font-size: 2.5rem;
    color: var(--secondary-color);
    margin-bottom: 10px;
  }

  .gift-thumbnail h4 {
    font-size: 0.9rem;
    color: var(--primary-color);
    text-transform: uppercase;
    font-weight: 700;
    margin: 0;
  }

  /* Gift Modal content */
  .gift-modal-content {
    background: var(--bg-color);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    text-align: center;
    border: 2px solid var(--secondary-color);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    max-width: 400px;
  }

  .gift-icon-modal {
    font-size: 3.5rem;
    color: var(--secondary-color);
    margin-bottom: 15px;
  }

  .gift-modal-content h3 {
    font-size: 1.8rem;
    margin-bottom: 10px;
  }

  .account-number {
    font-size: 1.6rem;
    font-weight: bold;
    letter-spacing: 2px;
    margin: 15px 0 5px;
    color: var(--text-color);
  }

  .account-holder {
    font-size: 1.1rem;
    color: #555;
    margin-bottom: 20px;
  }

  /* Map Modal */
  .modal {
    display: none;
    position: fixed;
    z-index: 9999;
    padding-top: 50px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    overflow: auto;
    background-color: rgba(0, 0, 0, 0.9);
  }

  .modal-content {
    margin: auto;
    display: block;
    width: 90%;
    max-width: 800px;
    animation: zoom 0.6s;
  }

  .modal-close {
    position: absolute;
    top: 15px;
    right: 35px;
    color: #f1f1f1;
    font-size: 40px;
    font-weight: bold;
    transition: 0.3s;
    cursor: pointer;
  }

  .modal-close:hover,
  .modal-close:focus {
    color: #bbb;
    text-decoration: none;
    cursor: pointer;
  }

  @keyframes zoom {
    from {
      transform: scale(0)
    }

    to {
      transform: scale(1)
    }
  }

  .map-container {
    cursor: pointer;
    transition: transform 0.3s ease;
  }

  .map-container:hover {
    transform: scale(1.02);
  }

  .map-container img {
    max-height: 500px;
    width: 100%;
    object-fit: contain;
    border-radius: 10px;
  }

  /* Modern Guestbook Messages */
  .modern-wish {
    display: flex;
    gap: 15px;
    background: #fff;
    padding: 1.5rem;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
    margin-bottom: 1rem;
    border-left: 4px solid var(--secondary-color);
  }

  .wish-avatar {

    height: 45px;
    border-radius: 50%;

    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .wish-content {
    flex: 1;
  }

  .wish-content h4 {
    margin: 0 0 5px 0;
    font-size: 1.1rem;
    color: var(--primary-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .wish-badge {
    font-size: 0.75rem;
    padding: 3px 8px;
    border-radius: 12px;
    font-weight: normal;
  }

  .badge-hadir {
    background: #e8f5e9;
    color: #2e7d32;
  }

  .badge-absen {
    background: #ffebee;
    color: #c62828;
  }

  .wish-date {
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 10px;
  }

  .wish-text {
    font-style: italic;
    color: #555;
    line-height: 1.5;
    background: var(--bg-color);
    padding: 10px 15px;
    border-radius: 0 10px 10px 10px;
    position: relative;
  }

  .wish-text::before {
    content: '';
    position: absolute;
    top: 0;
    left: -8px;
    border-width: 0 8px 10px 0;
    border-style: solid;
    border-color: transparent var(--bg-color) transparent transparent;
  }

  /* Bottom Navbar */
  .bottom-nav {
    display: block;
    position: fixed;
    bottom: 20px;

    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);

    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);

  .bottom-nav a:hover,
  .bottom-nav a:hover i {

  @media (max-width: 768px) {
