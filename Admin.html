<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <?!= include('AdminStyle'); ?>
</head>
<body>

  <div id="loader" class="loader-container">
    <div class="loader"></div>
    <p>Memuat Data...</p>
  </div>

  <div class="layout" style="display:none; width:100%;" id="admin-layout">
    
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <i class="fas fa-ring"></i> Wedding
      </div>
      <ul class="nav-links">
        <li><a href="#" class="active" id="nav-settings" onclick="showTab('settings')"><i class="fas fa-cog"></i> Pengaturan</a></li>
        <li><a href="#" id="nav-gallery" onclick="showTab('gallery')"><i class="fas fa-images"></i> Galeri</a></li>
        <li><a href="#" id="nav-rsvp" onclick="showTab('rsvp')"><i class="fas fa-users"></i> Data RSVP</a></li>
      </ul>
      <div class="sidebar-footer">
        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <div class="topbar">
        <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <div style="font-weight:600; color:var(--primary-color);">Dashboard Admin</div>
      </div>

      <div class="dashboard-container">
        
        <!-- Settings Tab -->
        <section id="settings-tab" class="tab-content active">
          <form id="settings-form" onsubmit="saveSettings(event)">
            <div class="dashboard-grid">
              
              <!-- Mempelai Card -->
              <div class="card">
                <div class="card-header"><i class="fas fa-heart"></i> Data Mempelai</div>
                
                <div class="floating-group">
                  <input type="text" id="BrideName" class="floating-input" placeholder=" " required>
                  <label class="floating-label">Nama Pengantin Wanita</label>
                </div>
                <div class="floating-group">
                  <textarea id="BrideDesc" class="floating-input" placeholder=" " rows="2"></textarea>
                  <label class="floating-label">Deskripsi Wanita (cth: Putri dari...)</label>
                </div>
                
                <div class="floating-group">
                  <input type="text" id="GroomName" class="floating-input" placeholder=" " required>
                  <label class="floating-label">Nama Pengantin Pria</label>
                </div>
                <div class="floating-group">
                  <textarea id="GroomDesc" class="floating-input" placeholder=" " rows="2"></textarea>
                  <label class="floating-label">Deskripsi Pria</label>
                </div>
                
                <div class="floating-group">
                  <textarea id="Greeting" class="floating-input" placeholder=" " rows="3"></textarea>
                  <label class="floating-label">Teks Sambutan</label>
                </div>
              </div>

              <!-- Jadwal & Lokasi Card -->
              <div class="card">
                <div class="card-header"><i class="fas fa-calendar-alt"></i> Jadwal & Lokasi</div>
                
                <div class="floating-group">
                  <input type="datetime-local" id="AkadDate" class="floating-input" placeholder=" " required>
                  <label class="floating-label">Waktu Akad</label>
                </div>
                <div class="floating-group">
                  <input type="datetime-local" id="ResepsiDate" class="floating-input" placeholder=" " required>
                  <label class="floating-label">Waktu Resepsi</label>
                </div>
                <div class="floating-group">
                  <input type="url" id="MapsLink" class="floating-input" placeholder=" " required>
                  <label class="floating-label">Link Google Maps</label>
                </div>
                <div class="file-upload-wrapper">
                  <label>Upload Denah Lokasi Baru (Opsional)</label>
                  <input type="file" id="MapImageFile" accept="image/*">
                </div>
                <div class="floating-group" style="margin-top: 10px;">
                  <input type="url" id="MusicUrl" class="floating-input" placeholder=" " required>
                  <label class="floating-label">URL Musik (.mp3)</label>
                </div>
              </div>

              <!-- Media & Amplop Card -->
              <div class="card" style="grid-column: span 1;">
                <div class="card-header"><i class="fas fa-gift"></i> Amplop Digital</div>
                
                <div id="bank-list">
                  <!-- Dynamic Bank Accounts -->
                </div>
                
                <button type="button" class="btn-secondary" onclick="addBankField()"><i class="fas fa-plus"></i> Tambah Rekening</button>
              </div>
              
            </div> <!-- End Dashboard Grid -->

            <div style="margin-top: 20px;">
              <button type="submit" class="btn-primary" id="btn-save-settings"><i class="fas fa-save"></i> Simpan Semua Pengaturan</button>
            </div>
          </form>
        </section>

        <!-- Gallery Tab -->
        <section id="gallery-tab" class="tab-content">
          <div class="dashboard-grid">
            <div class="card">
              <div class="card-header"><i class="fas fa-plus-circle"></i> Tambah Media Baru</div>
              <form id="add-gallery-form" onsubmit="addGallery(event)">
                <div class="floating-group">
                  <input type="text" id="media-name" class="floating-input" placeholder=" " required>
                  <label class="floating-label">Judul / Nama Media</label>
                </div>
                <div class="floating-group">
                  <select id="media-type" class="floating-input" style="padding-top:12px;">
                    <option value="photo">Foto</option>
                  </select>
                  <label class="floating-label" style="top:0; font-size:0.8rem; color:var(--primary-color);">Tipe Media</label>
                </div>
                <div class="file-upload-wrapper">
                  <label>Pilih File Foto</label>
                  <input type="file" id="media-file" accept="image/*" required>
                </div>
                <button type="submit" class="btn-primary" id="btn-add-gallery"><i class="fas fa-upload"></i> Unggah Media</button>
              </form>
            </div>

            <div class="card">
              <div class="card-header"><i class="fas fa-images"></i> Daftar Galeri</div>
              <div class="table-responsive">
                <table>
                  <thead>
                    <tr>
                      <th>Preview</th>
                      <th>Nama</th>
                      <th>Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="gallery-tbody">
                    <!-- Gallery items here -->
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </section>

        <!-- RSVP Tab -->
        <section id="rsvp-tab" class="tab-content">
          <div class="card">
            <div class="card-header"><i class="fas fa-envelope-open-text"></i> Data RSVP & Ucapan Tamu</div>
            <div class="table-responsive">
              <table>
                <thead>
                  <tr>
                    <th>Waktu</th>
                    <th>Nama</th>
                    <th>Kehadiran</th>
                    <th>Jml Tamu</th>
                    <th>Ucapan</th>
                  </tr>
                </thead>
                <tbody id="rsvp-tbody">
                  <!-- RSVP items here -->
                </tbody>
              </table>
            </div>
          </div>
        </section>

      </div> <!-- dashboard container -->
    </main>
  </div>

  <?!= include('AdminScript'); ?>
</body>
</html>
