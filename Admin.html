<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <?!= include('AdminStyle'); ?>
</head>
<body>

  <div id="loader" class="loader-container">
    <div class="loader"></div>
    <p>Memuat Data...</p>
  </div>

  <div class="layout" style="display:none;" id="admin-layout">
    <aside class="sidebar">
      <div class="logo">Admin Panel</div>
      <ul class="nav-links">
        <li><a href="#" class="active" onclick="showTab('settings')"><i class="fas fa-cog"></i> Pengaturan</a></li>
        <li><a href="#" onclick="showTab('gallery')"><i class="fas fa-images"></i> Galeri</a></li>
        <li><a href="#" onclick="showTab('rsvp')"><i class="fas fa-users"></i> Data RSVP</a></li>
        <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <!-- Settings Tab -->
      <section id="settings-tab" class="tab-content active">
        <h2>Pengaturan Undangan</h2>
        <form id="settings-form" onsubmit="saveSettings(event)">
          <div class="card">
            <h3>Mempelai</h3>
            <div class="form-group">
              <label>Nama Pengantin Wanita</label>
              <input type="text" id="BrideName" required>
            </div>
            <div class="form-group">
              <label>Nama Pengantin Pria</label>
              <input type="text" id="GroomName" required>
            </div>
            <div class="form-group">
              <label>Teks Sambutan</label>
              <textarea id="Greeting" rows="3"></textarea>
            </div>
          </div>
          <div class="card">
            <h3>Jadwal Acara</h3>
            <div class="form-group">
              <label>Waktu Akad (Format ISO, cth: 2026-12-01T08:00)</label>
              <input type="datetime-local" id="AkadDate" required>
            </div>
            <div class="form-group">
              <label>Waktu Resepsi (Format ISO, cth: 2026-12-01T11:00)</label>
              <input type="datetime-local" id="ResepsiDate" required>
            </div>
          </div>
          <div class="card">
            <h3>Lokasi & Media</h3>
            <div class="form-group">
              <label>URL Musik / Lagu (.mp3)</label>
              <input type="url" id="MusicUrl" required>
            </div>
            <div class="form-group">
              <label>Link Google Maps</label>
              <input type="url" id="MapsLink" required>
            </div>
            <div class="form-group">
              <label>URL Gambar Denah Lokasi (Opsional)</label>
              <input type="url" id="MapImage">
            </div>
          </div>
          <button type="submit" class="btn-primary" id="btn-save-settings">Simpan Pengaturan</button>
        </form>
      </section>

      <!-- Gallery Tab -->
      <section id="gallery-tab" class="tab-content">
        <h2>Kelola Galeri</h2>
        <div class="card">
          <h3>Tambah Media</h3>
          <form id="add-gallery-form" onsubmit="addGallery(event)">
            <div class="form-group">
              <label>Tipe Media</label>
              <select id="media-type">
                <option value="photo">Foto</option>
                <option value="video">Video</option>
              </select>
            </div>
            <div class="form-group">
              <label>URL Media (Direct Link)</label>
              <input type="url" id="media-url" required>
            </div>
            <button type="submit" class="btn-primary" id="btn-add-gallery">Tambahkan</button>
          </form>
        </div>
        <div class="card">
          <h3>Daftar Media</h3>
          <table class="data-table">
            <thead>
              <tr>
                <th>Preview</th>
                <th>Tipe</th>
                <th>URL</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="gallery-tbody">
              <!-- Gallery items here -->
            </tbody>
          </table>
        </div>
      </section>

      <!-- RSVP Tab -->
      <section id="rsvp-tab" class="tab-content">
        <h2>Data RSVP Tamu</h2>
        <div class="card">
          <table class="data-table">
            <thead>
              <tr>
                <th>Waktu</th>
                <th>Nama</th>
                <th>Kehadiran</th>
                <th>Jml Tamu</th>
                <th>Ucapan</th>
              </tr>
            </thead>
            <tbody id="rsvp-tbody">
              <!-- RSVP items here -->
            </tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <?!= include('AdminScript'); ?>
</body>
</html>
